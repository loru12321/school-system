<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智慧教务管理系统</title>
    <style>
        :root {
            color-scheme: light;
            --bg-1: #173c86;
            --bg-2: #2e62bd;
            --bg-3: #42a4e0;
            --card: rgba(255, 255, 255, 0.14);
            --line: rgba(255, 255, 255, 0.24);
            --text-main: #ffffff;
            --text-sub: rgba(255, 255, 255, 0.78);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            overflow: hidden;
            font-family: "Segoe UI", "Microsoft YaHei UI", sans-serif;
            color: var(--text-main);
            background:
                radial-gradient(circle at top left, rgba(150, 215, 255, 0.32), transparent 38%),
                radial-gradient(circle at bottom right, rgba(255, 209, 173, 0.22), transparent 32%),
                linear-gradient(145deg, var(--bg-1), var(--bg-2) 52%, var(--bg-3));
        }

        .shell {
            width: min(430px, calc(100vw - 44px));
            padding: 26px;
            border-radius: 28px;
            background: var(--card);
            border: 1px solid var(--line);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            box-shadow: 0 26px 60px rgba(9, 16, 36, 0.26);
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .mark {
            width: 54px;
            height: 54px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 18px;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.26), rgba(255, 255, 255, 0.14));
            border: 1px solid rgba(255, 255, 255, 0.22);
            font-size: 20px;
            font-weight: 800;
            letter-spacing: 0.08em;
        }

        .copy {
            display: grid;
            gap: 6px;
        }

        .copy strong {
            font-size: 22px;
            line-height: 1.06;
            letter-spacing: -0.04em;
        }

        .copy span {
            color: var(--text-sub);
            font-size: 13px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .hero {
            margin-top: 22px;
            display: grid;
            gap: 10px;
        }

        .hero h1 {
            margin: 0;
            font-size: 34px;
            line-height: 0.96;
            letter-spacing: -0.06em;
        }

        .hero p {
            margin: 0;
            color: var(--text-sub);
            font-size: 14px;
            line-height: 1.72;
        }

        .meter {
            margin-top: 24px;
            height: 8px;
            border-radius: 999px;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.14);
        }

        .meter::before {
            content: "";
            display: block;
            width: 42%;
            height: 100%;
            border-radius: inherit;
            background: linear-gradient(90deg, #ffffff, #d9ecff);
            animation: loading 1.4s ease-in-out infinite;
        }

        .meta {
            margin-top: 16px;
            display: flex;
            justify-content: space-between;
            gap: 12px;
            color: rgba(255, 255, 255, 0.72);
            font-size: 12px;
        }

        @keyframes loading {
            0% { transform: translateX(-120%); }
            100% { transform: translateX(320%); }
        }
    </style>
</head>
<body>
    <main class="shell" aria-label="启动中">
        <div class="brand">
            <div class="mark">SE</div>
            <div class="copy">
                <strong>智慧教务管理系统</strong>
                <span>SmartEdu Desktop</span>
            </div>
        </div>
        <section class="hero">
            <h1>桌面端正在准备工作区</h1>
            <p>正在加载本地单文件版本与桌面运行环境，保持与 Web 和 Android 端同一套界面和逻辑。</p>
        </section>
        <div class="meter" aria-hidden="true"></div>
        <div class="meta">
            <span>Windows EXE</span>
            <span>Local bundle bootstrap</span>
        </div>
    </main>
</body>
</html>
