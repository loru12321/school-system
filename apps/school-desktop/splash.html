<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智慧教务管理系统</title>
    <style>
        :root {
            color-scheme: light;
            --bg-1: #0f2c72;
            --bg-2: #2256b7;
            --bg-3: #3fa8db;
            --card: rgba(255, 255, 255, 0.16);
            --line: rgba(255, 255, 255, 0.22);
            --text-main: #ffffff;
            --text-sub: rgba(255, 255, 255, 0.8);
            --accent: rgba(255, 255, 255, 0.92);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            overflow: hidden;
            font-family: "Segoe UI", "Microsoft YaHei UI", sans-serif;
            color: var(--text-main);
            background:
                radial-gradient(circle at 16% 18%, rgba(188, 228, 255, 0.34), transparent 36%),
                radial-gradient(circle at 84% 80%, rgba(255, 209, 160, 0.26), transparent 28%),
                linear-gradient(145deg, var(--bg-1), var(--bg-2) 52%, var(--bg-3));
        }

        .shell {
            position: relative;
            width: min(438px, calc(100vw - 40px));
            padding: 28px 28px 24px;
            border-radius: 30px;
            background: var(--card);
            border: 1px solid var(--line);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 28px 70px rgba(7, 17, 44, 0.3);
        }

        .shell::before {
            content: "";
            position: absolute;
            inset: 14px;
            border-radius: 22px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            pointer-events: none;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .brand-icon {
            width: 62px;
            height: 62px;
            border-radius: 20px;
            padding: 6px;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.28), rgba(255, 255, 255, 0.12));
            border: 1px solid rgba(255, 255, 255, 0.24);
            box-shadow: 0 12px 24px rgba(9, 20, 55, 0.2);
            object-fit: cover;
        }

        .brand-copy {
            display: grid;
            gap: 6px;
        }

        .brand-copy strong {
            font-size: 22px;
            line-height: 1.08;
            letter-spacing: -0.04em;
        }

        .brand-copy span {
            color: var(--text-sub);
            font-size: 13px;
            letter-spacing: 0.12em;
            text-transform: uppercase;
        }

        .hero {
            margin-top: 24px;
            display: grid;
            gap: 12px;
        }

        .hero h1 {
            margin: 0;
            font-size: 33px;
            line-height: 0.98;
            letter-spacing: -0.06em;
        }

        .hero p {
            margin: 0;
            color: var(--text-sub);
            font-size: 14px;
            line-height: 1.72;
        }

        .meter {
            margin-top: 24px;
            height: 8px;
            border-radius: 999px;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.14);
        }

        .meter::before {
            content: "";
            display: block;
            width: 42%;
            height: 100%;
            border-radius: inherit;
            background: linear-gradient(90deg, var(--accent), rgba(214, 235, 255, 0.98));
            animation: loading 1.35s ease-in-out infinite;
        }

        .meta {
            margin-top: 18px;
            display: flex;
            justify-content: space-between;
            gap: 12px;
            color: rgba(255, 255, 255, 0.74);
            font-size: 12px;
        }

        @keyframes loading {
            0% { transform: translateX(-120%); }
            100% { transform: translateX(320%); }
        }
    </style>
</head>
<body>
    <main class="shell" aria-label="启动中">
        <div class="brand">
            <img class="brand-icon" src="./bundle/app-icon.png" alt="应用图标">
            <div class="brand-copy">
                <strong>智慧教务管理系统</strong>
                <span>SmartEdu Desktop</span>
            </div>
        </div>
        <section class="hero">
            <h1>桌面端正在准备工作区</h1>
            <p>正在加载本地单文件版本与桌面运行环境，保持和 Web 端、Android 端一致的入口、模块与成绩分析逻辑。</p>
        </section>
        <div class="meter" aria-hidden="true"></div>
        <div class="meta">
            <span>Windows Installer / EXE</span>
            <span>Local desktop shell</span>
        </div>
    </main>
</body>
</html>
